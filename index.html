<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveWellness</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans text-gray-900">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-4 h-16 flex items-center justify-between">
            <span class="font-bold text-xl text-pink-500">LoveWellness</span>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-[1600px] mx-auto px-2 sm:px-4 py-6">

        <!-- Filter -->
        <div class="flex justify-between mb-6">
            <span class="text-sm text-gray-500">
                Hosted on <span class="font-semibold">secure-cloud.net</span>
            </span>
        </div>

        <!-- Grid 1 -->
        <div id="grid-container-1" class="grid grid-cols-3 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-2 sm:gap-6"></div>

        <!-- Grid 2 -->
        <div id="grid-container-2" class="grid grid-cols-3 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-2 sm:gap-6"></div>

    </main>

<script>
const MOCK_DATA = [
    { id: 1, name: "Anastasia 🇷🇺", image: "./photos/C1.jpg", verified: true },
    { id: 2, name: "Isabella 🇪🇸", image: "./photos/C2.jpg", verified: true },
    { id: 3, name: "Sakura 🇯🇵", image: "./photos/C3.jpg", verified: false },
    { id: 4, name: "Amara 🇳🇬", image: "./photos/C4.jpg", verified: true }
];

function generateCardHTML(item) {
    return `
    <div class="bg-white rounded-xl shadow border">
        <img src="${item.image}" class="w-full h-48 object-cover">
        <div class="p-3">
            <h3 class="font-bold">${item.name}</h3>
            <a href="#" class="block mt-2 bg-pink-500 text-white text-center py-2 rounded">
                Watch
            </a>
        </div>
    </div>`;
}

function renderGrid(items) {
    const c1 = document.getElementById('grid-container-1');
    const c2 = document.getElementById('grid-container-2');

    c1.innerHTML = '';
    c2.innerHTML = '';

    items.slice(0, 2).forEach(i => c1.innerHTML += generateCardHTML(i));
    items.slice(2).forEach(i => c2.innerHTML += generateCardHTML(i));

    lucide.createIcons();
}

renderGrid(MOCK_DATA);
</script>

</body>
</html>
